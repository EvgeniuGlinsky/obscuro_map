name: obscuro_map
description: "A location-based exploration app that gradually reveals the world map as users move through real places.publish_to: 'none'"
version: 1.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  go_router_builder: ^4.2.0
  flutter_svg: ^2.2.3
  vector_graphics: ^1.1.19
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  flutter_meta_sdk: ^1.0.5
  injectable: ^2.7.1+4
  google_maps_flutter: ^2.5.3
  geolocator: ^13.0.4
  shared_preferences: ^2.3.4
  firebase_core: ^3.13.1
  firebase_crashlytics: ^4.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  flutter_gen_runner: ^5.2.0
  injectable_generator: ^2.11.1
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/features/splash/

flutter_gen:
  output: lib/gen/
  line_length: 120
  integrations:
    flutter_svg: true
    image: true
    rive: true

flutter_native_splash:
  color: "#C1BDD2"
  android_12:
    color: "#C1BDD2"

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/features/splash/app_logo.png"
  adaptive_icon_background: "#C1BDD2"
  adaptive_icon_foreground: "assets/features/splash/app_logo.png"
